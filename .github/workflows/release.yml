name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: NoPasaranFC-windows-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: NoPasaranFC-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: NoPasaranFC-macos-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: NoPasaranFC-macos-arm64

    runs-on: ${{ matrix.os }}
    name: Desktop (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish
        run: >
          dotnet publish NoPasaranFC.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -p:PublishReadyToRun=false
          -o publish

      - name: Zip artifact (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Zip artifact (Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: cd publish && zip -r ../${{ matrix.artifact }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  build-android:
    runs-on: ubuntu-latest
    name: Android

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfreetype6-dev libfontconfig1-dev

      - name: Install Android workload
        run: dotnet workload install android

      - name: Install MGCB tool
        run: dotnet tool install -g dotnet-mgcb

      - name: Build content for Android
        working-directory: Content
        run: mgcb /rebuild:true /@:Content.Android.mgcb

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Publish APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          SIGNING_ARGS=""
          if [ -f release.keystore ]; then
            SIGNING_ARGS="-p:AndroidKeyStore=true -p:AndroidSigningKeyStore=$(pwd)/release.keystore -p:AndroidSigningKeyAlias=$ANDROID_KEY_ALIAS -p:AndroidSigningKeyPass=$ANDROID_KEY_PASSWORD -p:AndroidSigningStorePass=$ANDROID_KEYSTORE_PASSWORD"
          fi
          dotnet publish NoPasaranFC.Android/NoPasaranFC.Android.csproj \
            -c Release \
            -f net9.0-android \
            $SIGNING_ARGS

      - name: Locate and rename APK
        run: |
          APK=$(find NoPasaranFC.Android/bin/Release/net9.0-android -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            find NoPasaranFC.Android/bin/Release -name "*.apk" -type f
            exit 1
          fi
          cp "$APK" NoPasaranFC.apk
          echo "APK: $APK ($(du -h NoPasaranFC.apk | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoPasaranFC-android
          path: NoPasaranFC.apk

  create-release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "NO PASARAN FC $TAG" \
            --generate-notes \
            artifacts/NoPasaranFC-windows-x64/*.zip \
            artifacts/NoPasaranFC-linux-x64/*.zip \
            artifacts/NoPasaranFC-macos-x64/*.zip \
            artifacts/NoPasaranFC-macos-arm64/*.zip \
            artifacts/NoPasaranFC-android/*.apk
